<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Grading System</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #1a1a1a, #3a3a3a);
      min-height: 100vh;
      padding: 30px;
      color: #f0f0f0;
    }

    .container {
      max-width: 1400px;
      margin: auto;
    }

    h1 {
      text-align: center;
      font-size: 42px;
      color: #c0c0c0;
      margin-bottom: 30px;
      letter-spacing: 2px;
      margin-bottom: 30px;
      letter-spacing: 2px;
    }

    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .tab-btn {
      flex: 1;
      padding: 16px;
      font-size: 20px;
      border: none;
      border-radius: 14px 14px 0 0;
      background: #5a5a5a;
      color: #f5f5f5;
      cursor: pointer;
      font-weight: bold;
    }

    .tab-btn.active {
    background: #2b2b2b;
    color: #c0c0c0;
}

.tab-content {
    display: none;
    background: rgba(255,255,255,0.95);
    border-radius: 0 18px 18px 18px;
    padding: 35px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.08);
}
    .tab-content.active {
      display: block;
    }

    .top-row,
    .subjects,
    .cutoff-grid,
    .cgpa-grid {
      display: grid;
      gap: 25px;
    }

    .top-row {
      grid-template-columns: repeat(2, 1fr);
      margin-bottom: 25px;
    }

    .subjects {
      grid-template-columns: repeat(2, 1fr);
      margin-bottom: 30px;
    }

    .cutoff-grid {
      grid-template-columns: repeat(2, 1fr);
      margin-bottom: 30px;
    }

    .field {
      display: flex;
      flex-direction: column;
    }

    label {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 10px;
      color: #2f2f2f;
    }

    input {
      height: 60px;
      border: 2px solid #6a6a6a;
      border-radius: 14px;
      padding: 0 18px;
      font-size: 22px;
      background: #f3f3f3;
    }

    .btn-row {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      margin-bottom: 25px;
    }

    button.action {
      height: 58px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #2b2b2b, #5e5e5e);
      color: white;
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
    }

    button.action:hover {
      background: linear-gradient(135deg, #000000, #777777);
    }

    .result-box {
      width: 55%;
      margin: auto;
      min-height: 110px;
      border: 2px solid #666666;
      border-radius: 14px;
      padding: 18px;
      font-size: 22px;
      background: #e8e8e8;
      color: #222222;
      white-space: pre-line;
      line-height: 1.8;
    }

    #cgpaSubjects {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 25px;
      margin: 30px 0;
    }

    @media (max-width: 900px) {
      .top-row,
      .subjects,
      .cutoff-grid,
      #cgpaSubjects,
      .btn-row {
        grid-template-columns: 1fr;
      }

      .result-box {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>STUDENT GRADING SYSTEM</h1>

    <div class="tabs">
      <button class="tab-btn active" onclick="openTab('grading', this)">Student Grading</button>
      <button class="tab-btn" onclick="openTab('cutoff', this)">Engineering Cutoff</button>
      <button class="tab-btn" onclick="openTab('cgpa', this)">CGPA Calculator</button>
    </div>

    <div id="grading" class="tab-content active">
      <div class="top-row">
        <div class="field">
          <label>Student Name</label>
          <input type="text" id="name">
        </div>
        <div class="field">
          <label>Roll Number</label>
          <input type="text" id="roll">
        </div>
      </div>

      <div class="subjects">
        <div class="field"><label>Subject 1 Marks</label><input type="number" id="m1"></div>
        <div class="field"><label>Subject 2 Marks</label><input type="number" id="m2"></div>
        <div class="field"><label>Subject 3 Marks</label><input type="number" id="m3"></div>
        <div class="field"><label>Subject 4 Marks</label><input type="number" id="m4"></div>
        <div class="field"><label>Subject 5 Marks</label><input type="number" id="m5"></div>
        <div class="field"><label>Subject 6 Marks</label><input type="number" id="m6"></div>
      </div>

      <div class="btn-row">
        <button class="action" onclick="calculateResult()">Calculate Result</button>
        <button class="action" onclick="clearResult()">Clear</button>
      </div>

      <div class="result-box" id="result">Result will appear here</div>
    </div>

    <div id="cutoff" class="tab-content">
      <div class="cutoff-grid">
        <div class="field">
          <label>Maths Marks</label>
          <input type="number" id="maths">
        </div>
        <div class="field">
          <label>Physics Marks</label>
          <input type="number" id="physics">
        </div>
        <div class="field">
          <label>Chemistry Marks</label>
          <input type="number" id="chemistry">
        </div>
      </div>

      <div class="btn-row">
        <button class="action" onclick="calculateCutoff()">Calculate Cutoff</button>
        <button class="action" onclick="clearCutoff()">Clear</button>
      </div>

      <div class="result-box" id="cutoffResult">Engineering cutoff will appear here</div>
    </div>

    <div id="cgpa" class="tab-content">
      <div class="field" style="max-width:500px; margin:auto;">
        <label>Number of Subjects</label>
        <input type="number" id="subjectCount">
      </div>

      <div class="btn-row" style="max-width:500px; margin:25px auto;">
        <button class="action" onclick="generateSubjects()">Generate Grade Fields</button>
      </div>

      <div id="cgpaSubjects"></div>

      <div class="btn-row" id="cgpaBtnRow" style="display:none; max-width:500px; margin:0 auto 25px;">
        <button class="action" onclick="calculateCGPA()">Calculate CGPA</button>
      </div>

      <div class="result-box" id="cgpaResult">CGPA will appear here</div>
    </div>
  </div>

  <script>
    function openTab(id, btn) {
      document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));

      document.getElementById(id).classList.add('active');
      btn.classList.add('active');
    }

    function calculateResult() {
      let total = 0;

      for (let i = 1; i <= 6; i++) {
        total += Number(document.getElementById('m' + i).value);
      }

      const average = total / 6;
      let grade = 'Fail';

      if (average >= 90) grade = 'A+';
      else if (average >= 80) grade = 'A';
      else if (average >= 70) grade = 'B';
      else if (average >= 60) grade = 'C';

      document.getElementById('result').innerText =
        'Name: ' + document.getElementById('name').value +
        '\nRoll No: ' + document.getElementById('roll').value +
        '\n\nTotal: ' + total +
        '\nAverage: ' + average.toFixed(2) +
        '\nGrade: ' + grade;
    }

    function clearResult() {
      document.getElementById('name').value = '';
      document.getElementById('roll').value = '';
      for (let i = 1; i <= 6; i++) {
        document.getElementById('m' + i).value = '';
      }
      document.getElementById('result').innerText = 'Result will appear here';
    }

    function calculateCutoff() {
      const maths = Number(document.getElementById('maths').value);
      const physics = Number(document.getElementById('physics').value);
      const chemistry = Number(document.getElementById('chemistry').value);

      const cutoff = maths + (physics / 2) + (chemistry / 2);

      document.getElementById('cutoffResult').innerText =
        'Engineering Cutoff: ' + cutoff.toFixed(2);
    }

    function clearCutoff() {
      document.getElementById('maths').value = '';
      document.getElementById('physics').value = '';
      document.getElementById('chemistry').value = '';
      document.getElementById('cutoffResult').innerText = 'Engineering cutoff will appear here';
    }

    function generateSubjects() {
      const count = Number(document.getElementById('subjectCount').value);
      const container = document.getElementById('cgpaSubjects');
      container.innerHTML = '';

      for (let i = 1; i <= count; i++) {
        const div = document.createElement('div');
        div.className = 'field';
        div.innerHTML = `
          <label>Subject ${i} Grade</label>
          <input type="text" id="g${i}" placeholder="O, A+, A, B+, B, C">
        `;
        container.appendChild(div);
      }

      document.getElementById('cgpaBtnRow').style.display = 'grid';
    }

    function calculateCGPA() {
      const count = Number(document.getElementById('subjectCount').value);
      let total = 0;

      for (let i = 1; i <= count; i++) {
        const grade = document.getElementById('g' + i).value.toUpperCase();

        if (grade === 'O') total += 10;
        else if (grade === 'A+') total += 9;
        else if (grade === 'A') total += 8;
        else if (grade === 'B+') total += 7;
        else if (grade === 'B') total += 6;
        else if (grade === 'C') total += 5;
      }

      document.getElementById('cgpaResult').innerText =
        'CGPA: ' + (total / count).toFixed(2);
    }
  </script>
</body>
</html>
